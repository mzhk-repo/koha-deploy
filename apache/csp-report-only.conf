# Managed by koha-deploy bootstrap module: csp-report-only
# Do not edit manually. Use .env + scripts/bootstrap-live-configs.sh --module csp-report-only

<IfModule mod_headers.c>
    Header always unset Content-Security-Policy
    Header always unset Content-Security-Policy-Report-Only
    Header always set Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://matomo.pinokew.buzz https://static.cloudflareinsights.com; connect-src 'self' https://matomo.pinokew.buzz; img-src 'self' data: https://matomo.pinokew.buzz; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
</IfModule>
